<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="naver-site-verification" content="3a469a7ea652d494b96bfd358da71a59456d6a0e" />
    <title>Youngs Books - 한울림 성전</title>
    <style>
        /* 1. 기본 배경 설정 */
        body { 
            margin: 0; 
            padding: 0; 
            background: #fff; 
            font-family: 'Malgun Gothic', sans-serif; 
            text-align: center; 
            overflow-x: hidden; 
        }

        /* 2. 3분할 홀로그램 엔진 (15.5초) */
        @keyframes holoFlow {
            0% { transform: translateX(0); }
            50% { transform: translateX(5%); }
            100% { transform: translateX(0); }
        }

        .stage {
            width: 100%;
            height: 500px; /* PC/폰 맞춤형 높이 */
            border-bottom: 10px solid #000;
            overflow: hidden;
            position: relative;
            background: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .holo-img {
            width: 300%; /* 양날개 구현을 위한 3배 크기 */
            height: 100%;
            object-fit: cover;
            position: absolute;
            left: -100%; /* 중앙 배치 */
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .active {
            opacity: 1;
            animation: holoFlow 15.5s infinite linear;
        }

        /* 3. 새벽카운터 전광판 */
        .counter-box {
            background: #000;
            color: #fff;
            padding: 30px;
            margin: 20px;
        }

        #c-val {
            font-size: 50pt;
            color: #ff0000;
            font-weight: bold;
        }

        /* 4. 본문 및 일기 구역 */
        .content-zone {
            padding: 40px;
            text-align: left;
            max-width: 900px;
            margin: 0 auto;
            line-height: 1.8;
            font-size: 15pt;
        }

        .diary-box {
            border-left: 15px solid #000;
            padding-left: 30px;
            margin-top: 50px;
            font-style: italic;
        }
    </style>
</head>
<body onclick="control()">

    <h1 style="font-size: 40pt; margin: 40px 0;">Youngs Books</h1>

    <div class="stage" id="st">
        <img src="1컷상하.jpg" class="holo-img active" id="i0">
        <img src="1컷좌우.jpg" class="holo-img" id="i1">
        <img src="2zjtwhdkn.jpg" class="holo-img" id="i2">
        <img src="3tkd.jpg" class="holo-img" id="i3">
    </div>

    <div class="counter-box">
        <div id="c-val">91</div>
        <p style="font-size: 18pt;">전 세계 지식 공유 횟수</p>
    </div>

    <div class="content-zone">
        <p>지식은 멈추지 않고 흘러야 하며, 감동은 전달돼야 한다.</p>
        <div class="diary-box">
            오늘 드디어 한울림 성전의 문을 열었다. 91명의 동지들과 함께 시작하는 이 길은 결코 외롭지 않다.
        </div>
    </div>

    <script>
        // 변수 설정
        var cur = 0;
        var len = 4; // 사진 4장
        var play = true;
        var itv;

        // 15.5초마다 그림 바꾸기 로직
        function next() {
            if(!play) return;
            document.getElementById('i' + cur).classList.remove('active');
            cur = (cur + 1) % len;
            document.getElementById('i' + cur).classList.add('active');
        }

        // 엔진 가동
        itv = setInterval(next, 15500);

        // 클릭 시 일시정지/재생 (관찰 모드)
        function control() {
            play = !play;
            if(play) {
                itv = setInterval(next, 15500);
                console.log("재생 시작");
            } else {
                clearInterval(itv);
                console.log("일시 정지");
            }
        }

        // 새벽카운터 실시간 동기화
        window.onload = function() {
            var url = "https://script.google.com/macros/s/AKfycbwa3mx4TsDDqJnr5S_jAAGEBOqaE7AqnytDvG_nQCDRF07sRQngpyOCmSNpBWJqEbyW/exec";
            fetch(url + "?action=hit")
                .then(r => r.json())
                .then(d => {
                    document.getElementById('c-val').innerText = d.count.toLocaleString();
                });
        }
    </script>
</body>
</html>
